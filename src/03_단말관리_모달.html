<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>가이드 | E-BIT 관리자</title>
  {{> meta}}
</head>

<body class="al-admin">
  <div class="al-wrap">

    {{> header }}

    <div class="al-body">
      <div class="al-backdrop" id="alBackdrop" aria-hidden="true"></div>

      {{> nav }}
      <main class="al-content" id="alContent">
        <div class="mdm-list">
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-reglist">단말 등록(설치업체)</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-detail">단말 상세 정보</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-regist">단말 등록</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-regist2">단말 등록-정류장 맵핑</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-regist3">단말 등록-완료</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-detail-view">단말 상세
            정보-완료</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-customer-regist">단말 - 고객사
            등록</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-customer-select">단말 - 고객사
            선택</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-customer-complete">단말 - 고객사
            등록-완료</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-group-regist">그룹 단말 등록</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-group-detail">그룹 단말 상세</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-remote-detail">원격 제어 상세</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-remote-history-detail">원격 이력 상세</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-remote-request">단말 원격 요청</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-status-detail-info">상태 이력 상세(단말정보)</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-status-detail-history">상태 이력 상세(상태이력)</button>
          <button type="button" class="btn btn--primary btn--md" data-al-modal-open="mdm-status-detail-remote">상태 이력 상세(원격제어)</button>
        </div>

        {{>modal-collection }}



      </main>
      <!-- // al-content -->
    </div>
  </div>




  <script type="module" src="./js/page/index.js"></script>
</body>

</html>
